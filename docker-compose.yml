services:
  api:
    build: ./api
    image: datanow
    container_name: datanow_api
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    depends_on:
      - mongodb
      - redis
      - minio
      - ollama
    networks:
      - datanow

  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    hostname: mongodb
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - datanow

  # Initialize a replica set
  mongo-init:
    image: mongo:latest
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    networks:
      - datanow
    command: >
      mongosh --host mongodb:27017 --quiet --eval
      "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }"

  redis:
    image: redis:latest
    container_name: redis_cache_container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - datanow

  minio:
    image: minio/minio:latest
    container_name: minio_container
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ./.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - datanow

  # Create a bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    networks:
      - datanow
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/datanow
      "
    env_file:
      - ./.env

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_container
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - datanow

  pay:
    build: ./payment
    image: pay
    container_name: pay_container
    env_file:
      - ./payment/.env
    ports:
      - "1402:1402"
    volumes:
      - pay_data:/data
    networks:
      - datanow

volumes:
  mongo_data:
  redis_data:
  minio_data:
  ollama_data:
  pay_data:

networks:
  datanow:
    driver: bridge
