spring.application.name=datanow
server.port=3000
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
jwt.secret=${JWT_SECRET:changeme-use-a-real-secret-in-production}
paymentKey=${PAYMENT_KEY:changeme-use-a-real-key-in-production}
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:datanow}
minio.region=${MINIO_REGION:us-east-1}